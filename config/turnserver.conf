# coturn config — values on the CLI in docker-compose override/extend these.
# Auth mode: REST API shared secret (use-auth-secret).
# The Go service computes username/password per client from TURN_STATIC_SECRET.
#
# NOTE on TLS: turnserver flags --no-tls and --no-dtls are NOT set here.
# Real deployments that want turn:// or turns:// must:
#   1) drop --no-tls here
#   2) provision a cert and pass --cert / --pkey to turnserver (typically via
#      the docker-compose command line, not this file)
# Until then, plain turn:3478/tcp + turn:3478/udp work and the Go service
# advertises them as ICE servers.
listening-port=3478
tls-listening-port=5349
use-auth-secret
fingerprint
no-cli
min-port=49152
max-port=49200
