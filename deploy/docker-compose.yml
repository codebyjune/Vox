services:
  livekit:
    image: livekit/livekit-server:v1.13.2
    command: --config /etc/livekit.yaml --node-ip ${SERVER_IP}
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit-prod.yaml:/etc/livekit.yaml:ro

  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Must match the keys line in livekit-prod.yaml
      - LIVEKIT_API_KEY=prodkey
      - LIVEKIT_API_SECRET=prodsecret-change-me-to-a-random-string-64-chars-min
      - LIVEKIT_HOST=ws://${SERVER_IP}:7880
      - GO_HTTP_ADDR=:8080
      - DB_PATH=/data/vox.db
    volumes:
      - vox_data:/data
    depends_on:
      - livekit

volumes:
  vox_data:
