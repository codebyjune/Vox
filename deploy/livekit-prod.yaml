# LiveKit production config for Alibaba Cloud.
# The API key/secret here must match the env vars passed to the Go backend.
port: 7880
bind_addresses:
  - "0.0.0.0"

log_level: info

rtc:
  tcp_port: 7881
  use_external_ip: false

keys:
  # CHANGE THESE to strong random strings before deploying:
  prodkey: prodsecret-change-me-to-a-random-string-64-chars-min

room:
  auto_create: true
  empty_timeout: 300
  max_participants: 20

turn:
  enabled: false
