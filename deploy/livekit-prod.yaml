# LiveKit production config for Alibaba Cloud.
# The API key/secret here must match the env vars passed to the Go backend.
port: 7880
bind_addresses:
  - "0.0.0.0"

log_level: info

rtc:
  tcp_port: 7881
  use_external_ip: true
  force_tcp: true

keys:
  # CHANGE THESE to strong random strings before deploying:
  prodkey: e9edcad3d9d33d6dc7dac274e5147b7dfa47243e8e80625d4203cb611f6756be

room:
  auto_create: true
  empty_timeout: 300
  max_participants: 20

turn:
  enabled: false
