# LiveKit dev config — deterministic key/secret so the Go backend can match.
# Used ONLY by deploy/local/docker-compose.yml for local end-to-end testing.
port: 7880
bind_addresses:
  - "0.0.0.0"

log_level: info

rtc:
  tcp_port: 7881
  # Advertise 127.0.0.1 as the node IP so the WebRTC client connects to
  # localhost (colima forwards to the container). Without this, LiveKit picks
  # the container's internal IP (172.18.0.2) which is unreachable from macOS.
  node_ip: 127.0.0.1
  use_external_ip: false

keys:
  devkey: devsecret-change-me-32-bytes-min-abcdef

room:
  auto_create: true
  empty_timeout: 60
  max_participants: 8

turn:
  enabled: false
